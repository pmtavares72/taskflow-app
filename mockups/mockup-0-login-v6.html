<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Acceder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #13141f;
  --surface:      #1a1b2e;
  --elevated:     #1f2035;
  --card:         #242540;
  --sidebar-ai:   #111220;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text:         #f0f1ff;
  --text-sub:     rgba(240,241,255,0.6);
  --text-muted:   rgba(240,241,255,0.35);
  --accent:       #2fd4aa;
  --accent-blue:  #60a5fa;
  --accent-purple:#a78bfa;
  --accent-orange:#fb923c;
  --accent-pink:  #f472b6;
  --accent-green: #4ade80;
  --icon-teal:    rgba(47,212,170,0.15);
  --icon-blue:    rgba(96,165,250,0.15);
  --icon-purple:  rgba(167,139,250,0.15);
  --shadow-lg:    0 24px 60px rgba(0,0,0,0.7);
}

/* ===== FULL PAGE LAYOUT ===== */
html {
  height: 100%;
}
body {
  min-height: 100vh;
  width: 100%;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;

  /* Base dark background */
  background-color: var(--bg);

  /* Layered gradient mesh */
  background-image:
    radial-gradient(ellipse 80% 60% at 15% 0%,   rgba(167,139,250,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 90% 100%,  rgba(47,212,170,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 85% 15%,   rgba(96,165,250,0.10) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 10% 80%,   rgba(251,146,60,0.06) 0%, transparent 50%),
    radial-gradient(circle, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: auto, auto, auto, auto, 22px 22px;
}

/* ===== AMBIENT ORBS ===== */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.orb-purple {
  width: 800px; height: 800px;
  top: -250px; left: -200px;
  background: radial-gradient(circle, rgba(167,139,250,0.20) 0%, transparent 60%);
  filter: blur(100px);
  animation: drift 22s ease-in-out infinite;
}
.orb-teal {
  width: 700px; height: 700px;
  bottom: -200px; right: -150px;
  background: radial-gradient(circle, rgba(47,212,170,0.18) 0%, transparent 60%);
  filter: blur(110px);
  animation: drift 18s ease-in-out infinite reverse;
}
.orb-blue {
  width: 500px; height: 500px;
  top: 40%; right: 15%;
  background: radial-gradient(circle, rgba(96,165,250,0.12) 0%, transparent 60%);
  filter: blur(80px);
  animation: drift 28s ease-in-out infinite 4s;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  33%  { transform: translate(30px, -35px); }
  66%  { transform: translate(-20px, 20px); }
}

/* Central halo behind card */
.card-halo {
  position: fixed;
  width: 700px; height: 700px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background:
    radial-gradient(ellipse 50% 40% at 40% 55%, rgba(167,139,250,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 62% 45%, rgba(47,212,170,0.12) 0%, transparent 60%);
  filter: blur(50px);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: halo-pulse 9s ease-in-out infinite;
}
@keyframes halo-pulse {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
}

/* ===== LOGIN CARD ===== */
.page-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    var(--shadow-lg),
    0 0 0 1px rgba(167,139,250,0.30),
    0 0 50px rgba(167,139,250,0.14),
    0 0 100px rgba(47,212,170,0.08);
  animation: card-in 0.65s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(32px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Animated aurora strip at top of card */
.card-header-strip {
  height: 4px;
  background: linear-gradient(90deg,
    var(--accent-purple) 0%,
    var(--accent-blue)   30%,
    var(--accent)        60%,
    var(--accent-green)  80%,
    var(--accent-purple) 100%);
  background-size: 300% 100%;
  animation: aurora 5s linear infinite;
}
@keyframes aurora {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* Login panel body */
.login-panel {
  width: 100%;
  background: var(--elevated);
  padding: 36px 36px 32px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Dot mesh overlay on the card */
.login-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
  z-index: 0;
}

/* Inner gradient wash at top of panel */
.login-panel::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 160px;
  background: linear-gradient(180deg,
    rgba(167,139,250,0.07) 0%,
    transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* All content inside panel must be above pseudo-elements */
.login-panel > * { position: relative; z-index: 1; }

/* ===== Logo ===== */
.logo-area { margin-bottom: 28px; }
.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  background: var(--icon-teal);
  border: 1px solid rgba(47,212,170,0.25);
  border-radius: 13px;
  margin-bottom: 18px;
  box-shadow: 0 0 20px rgba(47,212,170,0.12);
}
.logo-mark svg {
  width: 20px; height: 20px;
  stroke: var(--accent); fill: none; stroke-width: 2;
}
.logo-text {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 10px;
}
.logo-text em { color: var(--accent); font-style: normal; }

.logo-tagline {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1.5;
}

/* AI badge */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(167,139,250,0.12);
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 20px;
  padding: 3px 9px;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent-purple);
  letter-spacing: 0.05em;
}
.ai-badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent-purple);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.sep { height: 1px; background: var(--border); margin: 22px 0; }

/* ===== Form fields ===== */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.input-wrap { position: relative; }
.form-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: rgba(47,212,170,0.45);
  box-shadow: 0 0 0 3px rgba(47,212,170,0.10);
}
.form-input::placeholder { color: var(--text-muted); opacity: 0.6; }

.pw-toggle {
  position: absolute;
  right: 11px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  display: flex;
  padding: 4px;
  transition: color 0.15s;
}
.pw-toggle:hover { color: var(--text-sub); }
.pw-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

.remember-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  cursor: pointer;
}
.remember-row input[type="checkbox"] {
  width: 15px; height: 15px;
  accent-color: var(--accent);
  cursor: pointer;
}
.remember-row span {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  user-select: none;
}

/* ===== Buttons ===== */
.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #13141f;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 0 24px rgba(47,212,170,0.35), 0 4px 14px rgba(0,0,0,0.35);
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events: none;
}
.btn-primary:hover {
  background: #3de0b5;
  box-shadow: 0 0 36px rgba(47,212,170,0.5), 0 4px 18px rgba(0,0,0,0.35);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary .spinner {
  display: none;
  width: 17px; height: 17px;
  border: 2px solid rgba(19,20,31,0.25);
  border-top-color: #13141f;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
.btn-primary.loading .btn-text { display: none; }
.btn-primary.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.divider-text {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 18px 0;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.divider-text::before, .divider-text::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.btn-sso {
  width: 100%;
  background: transparent;
  color: var(--text-sub);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-sso:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.04);
  color: var(--text);
}
.btn-sso svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

.card-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-muted);
}
.card-footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.15s;
}
.card-footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- Ambient orbs in background -->
<div class="orb orb-purple"></div>
<div class="orb orb-teal"></div>
<div class="orb orb-blue"></div>
<div class="card-halo"></div>

<div class="page-wrap">
  <!-- Animated aurora top border -->
  <div class="card-header-strip"></div>

  <div class="login-panel">
    <div class="logo-area">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <span class="logo-text">Task<em>Flow</em></span>
      <p class="logo-tagline">
        Tu espacio de trabajo inteligente
        <span class="ai-badge"><span class="ai-badge-dot"></span>AI</span>
      </p>
    </div>

    <div class="sep"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" value="ptavares@openclaw.io" />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="pwInput" value="••••••••••••" style="padding-right:40px;" />
          <button type="button" class="pw-toggle" onclick="togglePw()">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <label class="remember-row">
        <input type="checkbox" checked />
        <span>Recordar sesión</span>
      </label>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span class="btn-text">Entrar en TaskFlow</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="divider-text">o continúa con</div>

    <button class="btn-sso">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Acceso corporativo (SSO)
    </button>

    <div class="card-footer">
      <a href="#">¿Problemas para acceder? Contacta soporte</a>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const i = document.getElementById('pwInput');
  const ic = document.getElementById('eyeIcon');
  if (i.type === 'password') {
    i.type = 'text'; i.value = 'micontraseña123';
    ic.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    i.type = 'password'; i.value = '••••••••••••';
    ic.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="btn-text">✓ Sesión iniciada</span>';
  }, 1800);
}
</script>
</body>
</html>
