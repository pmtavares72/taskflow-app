<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Acceder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0d1526;
  --surface:      #111d36;
  --elevated:     #172040;
  --card:         #1a2645;
  --card-hover:   #1e2c50;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text:         #f0f4ff;
  --text-sub:     #94a3c4;
  --text-muted:   #5a6a8a;
  --accent:       #f0c040;
  --accent-dark:  #d4a020;
  --accent-dim:   rgba(240,192,64,0.12);
  --accent-glow:  rgba(240,192,64,0.25);
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:    0 4px 20px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.2);
  --shadow-lg:    0 12px 48px rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.3);
}

html, body {
  min-height: 100vh;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(30,60,120,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(15,40,90,0.5) 0%, transparent 60%),
    radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: auto, auto, 28px 28px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Ambient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(40,80,180,0.18) 0%, transparent 70%);
  top: -150px; left: -150px;
  animation: drift 14s ease-in-out infinite;
}
.orb-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(240,192,64,0.06) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: drift 18s ease-in-out infinite reverse;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  33%  { transform: translate(20px, -20px); }
  66%  { transform: translate(-12px, 12px); }
}

/* Card */
.login-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 40px 36px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.04) inset;
  animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  overflow: hidden;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Gold top accent line */
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,192,64,0.5), transparent);
}

/* Logo */
.logo-area {
  text-align: center;
  margin-bottom: 28px;
}
.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px; height: 48px;
  background: linear-gradient(135deg, rgba(240,192,64,0.15), rgba(240,192,64,0.05));
  border: 1px solid rgba(240,192,64,0.2);
  border-radius: 14px;
  margin-bottom: 14px;
}
.logo-mark svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 2; }
.logo-text {
  display: block;
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
}
.logo-text em { color: var(--accent); font-style: italic; }
.tagline {
  font-size: 13.5px;
  color: var(--text-sub);
  font-weight: 400;
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}
.divider-text {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.divider-text::before, .divider-text::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Form */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.input-wrap { position: relative; }
.form-input {
  width: 100%;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.form-input:focus {
  border-color: rgba(240,192,64,0.4);
  box-shadow: 0 0 0 3px rgba(240,192,64,0.08);
  background: #1c2b4a;
}
.form-input::placeholder { color: var(--text-muted); }

.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.15s;
  background: none;
  border: none;
  padding: 4px;
  display: flex;
}
.pw-toggle:hover { color: var(--text-sub); }
.pw-toggle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

.remember-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
  cursor: pointer;
}
.remember-row input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.remember-row span {
  font-size: 13.5px;
  color: var(--text-sub);
  user-select: none;
}

/* Primary button */
.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #0d1526;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(240,192,64,0.3);
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.btn-primary:hover {
  background: #f5cc50;
  box-shadow: 0 6px 24px rgba(240,192,64,0.4);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(13,21,38,0.25);
  border-top-color: #0d1526;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.btn-primary.loading .btn-text { display: none; }
.btn-primary.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SSO button */
.btn-sso {
  width: 100%;
  background: rgba(255,255,255,0.04);
  color: var(--text-sub);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-sso:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.07);
  color: var(--text);
}
.btn-sso svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

.card-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12.5px;
  color: var(--text-muted);
}
.card-footer a {
  color: var(--text-sub);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.15s;
}
.card-footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <span class="logo-text">Task<em>Flow</em></span>
    <p class="tagline">Tu espacio de trabajo inteligente</p>
  </div>

  <div class="divider"></div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-input" value="ptavares@openclaw.io" />
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="pwInput" value="••••••••••••" style="padding-right:42px;" />
        <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw()">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <label class="remember-row">
      <input type="checkbox" checked />
      <span>Recordar sesión</span>
    </label>

    <button type="submit" class="btn-primary" id="loginBtn">
      <span class="btn-text">Entrar en TaskFlow</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="divider-text">o continúa con</div>

  <button class="btn-sso">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Acceso corporativo (SSO)
  </button>

  <div class="card-footer">
    <a href="#">¿Problemas para acceder? Contacta soporte</a>
  </div>
</div>

<script>
function togglePw() {
  const input = document.getElementById('pwInput');
  const icon  = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    input.value = 'micontraseña123';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    input.value = '••••••••••••';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="btn-text">✓ Sesión iniciada</span>';
    btn.style.background = '#2fba7a';
    btn.style.boxShadow = '0 4px 16px rgba(47,186,122,0.35)';
  }, 1800);
}
</script>
</body>
</html>
